server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_resume_builder?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      indent_output: true

app:
  groq:
    api-key: ${GROQ_API_KEY}
    base-url: https://api.groq.com/openai
    model: llama-3.3-70b-versatile   # ✅ updated working model

  openrouter:
    api-key: ${OPENROUTER_API_KEY}
    base-url: https://openrouter.ai/api/v1
    model: meta-llama/llama-3.1-8b-instruct:free

  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

logging:
  level:
    root: INFO
    org.springframework.ai: DEBUG   # AI debug logs helpful
    org.hibernate.SQL: DEBUG